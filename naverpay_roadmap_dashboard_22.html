<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문형 파트 과제 로드맵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap');
  :root {
    --bg:#f5f6f8;--surface:#fff;--surface2:#f0f2f5;--border:#e4e7ed;--border2:#d0d4dc;
    --text1:#1a1d23;--text2:#5a6070;--text3:#9aa0ae;
    --green:#16a34a;--green-bg:#dcfce7;
    --yellow:#ca8a04;--yellow-bg:#fef9c3;
    --red:#dc2626;--red-bg:#fee2e2;
    --gray:#6b7280;--gray-bg:#f3f4f6;
    --blue:#2563eb;--blue-bg:#eff6ff;
    --accent:#03c75a;
    --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
    /* 위키 색상 기준 */
    --ph-plan:#0ea5e9;    --ph-plan-bg:#bae6fd;    /* 하늘 = 기획 */
    --ph-design:#f472b6;  --ph-design-bg:#fbcfe8;  /* 분홍 = 디자인 */
    --ph-dev:#ca8a04;     --ph-dev-bg:#fde68a;     /* 노랑 = 개발 */
    --ph-open:#dc2626;    --ph-open-bg:#fca5a5;    /* 빨강 = 배포 */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);font-size:14px;line-height:1.5;min-height:100vh}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-text{font-size:15px;font-weight:600}
  .hdiv{width:1px;height:20px;background:var(--border);margin:0 12px}
  .hmeta{font-size:12px;color:var(--text3)}
  .main{padding:24px 28px;max-width:1700px;margin:0 auto}
  .sg{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
  .sc-label{font-size:11px;color:var(--text3);font-weight:500;display:flex;align-items:center;gap:5px;margin-bottom:6px}
  .sc-val{font-size:26px;font-weight:600;color:var(--text1)}
  .sc.green .sc-val{color:var(--green)}.sc.yellow .sc-val{color:var(--yellow)}.sc.red .sc-val{color:var(--red)}.sc.gray .sc-val{color:var(--gray)}
  .tw{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:visible}
  .th{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 20px}
  .tb{font-size:13px;font-weight:500;color:var(--text3);padding:14px 18px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Noto Sans KR',sans-serif;transition:color .15s,border-color .15s}
  .tb:hover{color:var(--text2)}.tb.active{color:var(--text1);border-bottom-color:var(--accent)}
  .fb{display:flex;gap:8px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
  .fl{font-size:12px;color:var(--text3);margin-right:2px}
  select,input[type=text]{font-size:12px;font-family:'Noto Sans KR',sans-serif;padding:5px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text1);outline:none;transition:border-color .15s}
  select:focus,input[type=text]:focus{border-color:var(--accent)}
  input[type=text]{width:160px}
  input[type=text]::placeholder{color:var(--text3)}
  .lb{display:flex;gap:14px;align-items:center;padding:9px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .lt{font-size:11px;color:var(--text3);font-weight:500}
  .li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
  .pchip{display:inline-flex;align-items:center;height:14px;padding:0 7px;border-radius:3px;font-size:10px;font-weight:600}
  .sg-group{border-bottom:1px solid var(--border)}.sg-group:last-child{border-bottom:none}
  .sg-title{font-size:12px;font-weight:600;color:var(--text2);padding:9px 20px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .sg-badge{font-size:10px;background:var(--surface);border:1px solid var(--border2);color:var(--text3);padding:2px 8px;border-radius:20px}
  .tt-wrap{width:100%;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch}
  .tt{width:100%;min-width:1320px;border-collapse:separate;border-spacing:0;table-layout:auto}
  .tt tr{position:relative;z-index:1}
  .tt tr.dropdown-active{z-index:3000}
  .tt tr.dropdown-active td{position:relative;z-index:3000}
  .tt th{font-size:11px;font-weight:500;color:var(--text3);padding:7px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface);white-space:normal;word-break:keep-all}
  .tt td{padding:9px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
  .tt tr:last-child td{border-bottom:none}
  .tt tbody tr:hover{background:#f8f9fb}
  .tn{font-size:13px;font-weight:500;color:var(--text1);outline:none;border:none;background:transparent;width:100%;font-family:'Noto Sans KR',sans-serif;word-break:keep-all;cursor:text;padding:1px 4px;border-radius:4px;transition:background .15s}
  .tn:hover{background:var(--surface2)}
  .tn:focus{background:var(--blue-bg);box-shadow:0 0 0 2px rgba(37,99,235,.2)}
  .td .tn{text-decoration:line-through;color:var(--text3)}
  /* 행 전체 opacity를 주면 내부 드롭다운도 반투명해져 뒤에 깔린 것처럼 보이므로 제거 */
  .th2{opacity:1}
  .ot{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--blue-bg);color:var(--blue);font-weight:500;white-space:nowrap}
  .sb{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
  .s-green{background:var(--green-bg);color:var(--green)}.s-yellow{background:var(--yellow-bg);color:var(--yellow)}.s-red{background:var(--red-bg);color:var(--red)}.s-gray{background:var(--gray-bg);color:var(--gray)}
  .sd{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  /* 상태 뱃지 (원+텍스트) */
  .status-badge-btn{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:opacity .15s}
  .status-badge-btn:hover{opacity:.8}
  .sbb-green{background:var(--green-bg);color:var(--green)}
  .sbb-yellow{background:var(--yellow-bg);color:var(--yellow)}
  .sbb-red{background:var(--red-bg);color:var(--red)}
  .sbb-gray{background:var(--gray-bg);color:var(--gray)}
  .sbb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
  /* 상태 드롭다운 */
  .status-wrap{position:relative;display:inline-block}
  .status-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:99999;padding:6px;min-width:110px}
  .status-dd.open{display:block}
  .status-opt{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;border:none;background:none;width:100%;font-family:'Noto Sans KR',sans-serif;text-align:left}
  .status-opt:hover{background:var(--surface2)}
  .mc{font-size:11px;color:var(--text2);max-width:220px;line-height:1.5}
  /* 타임라인 */
  .tlw{overflow-x:auto}
  .tlt{border-collapse:collapse;width:100%}
  .tlt th{font-size:11px;font-weight:500;color:var(--text3);padding:7px 0;text-align:center;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
  .tlt th.thn{text-align:left;padding-left:20px;min-width:220px;width:220px;position:sticky;left:0;z-index:20;background:var(--surface2)}
  .tlt th.tho{text-align:left;padding-left:8px;min-width:80px;width:80px;background:var(--surface2)}
  .tlt th.thm{min-width:56px;width:56px}
  .tlt th.thm.tm{color:var(--red);font-weight:600}
  .yr-row th{background:#e8edf2 !important;font-size:11px !important;color:var(--text2) !important;padding:5px 0 !important}
  .ts-row td{background:var(--surface2);font-size:12px;font-weight:600;color:var(--text2);padding:6px 20px;border-bottom:1px solid var(--border);border-top:2px solid var(--border2)}
  .ts-row td.sn{position:sticky;left:0;z-index:10;background:var(--surface2)}
  .tlt tbody tr{border-bottom:1px solid var(--border)}
  .tlt tbody tr:hover:not(.ts-row){background:#f8f9fb}
  .tlt tbody td{padding:0;vertical-align:middle}
  .tlt tbody td.tdn{padding:6px 10px 6px 20px;font-size:12px;font-weight:500;color:var(--text1);position:sticky;left:0;background:var(--surface);z-index:5;min-width:220px;width:220px;border-right:1px solid var(--border)}
  .tlt tbody tr:hover td.tdn{background:#f8f9fb}
  .tlt tbody td.tdo{padding:4px 8px;border-right:1px solid var(--border);min-width:80px;width:80px}
  .mo-cell{min-width:56px;width:56px;position:relative;padding:3px 1px !important}
  .mo-cell.today-cell{background:rgba(220,38,38,.04)}
  .bar-row{display:flex;flex-direction:column;gap:2px;padding:2px 0}
  .bar-seg{height:13px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bar-seg span{font-size:9px;font-weight:600;white-space:nowrap;line-height:1}
  .today-line{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(220,38,38,.6);z-index:3;pointer-events:none}
  .empty{padding:48px;text-align:center;color:var(--text3);font-size:13px}
  /* 목록 탭 상세일정 */
  .phase-label{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s;outline:none;border:none;font-family:'Noto Sans KR',sans-serif}
  .phase-label:hover{opacity:.8}
  .pl-plan{background:var(--ph-plan-bg);color:var(--ph-plan)}
  .pl-design{background:var(--ph-design-bg);color:var(--ph-design)}
  .pl-dev{background:var(--ph-dev-bg);color:var(--ph-dev)}
  .pl-open{background:var(--ph-open-bg);color:var(--ph-open)}
  .pl-done{background:var(--gray-bg);color:var(--gray)}
  .phase-col{min-width:100px;vertical-align:top;padding:8px 10px !important}
  .phase-col-header{font-size:11px;font-weight:500;color:var(--text3);white-space:nowrap}
  .phase-edit-wrap{position:relative;display:inline-block}
  .phase-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:99999;padding:10px;min-width:160px}
  .phase-dropdown.open{display:block}
  .phase-dropdown input[type=text]{width:100%;margin-bottom:6px;font-size:12px;padding:5px 8px}
  .pd-row{display:flex;gap:4px;flex-wrap:wrap}
  .pd-chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif}
  .pd-chip:hover{opacity:.8}
  /* 드래그앤드롭 */
  .drag-handle{cursor:grab;color:var(--text3);padding:0 6px 0 2px;font-size:14px;user-select:none;flex-shrink:0;line-height:1}
  .drag-handle:active{cursor:grabbing}
  tr.dragging{opacity:.4;background:var(--blue-bg) !important}
  tr.drag-over-top td{border-top:2px solid var(--accent) !important}
  tr.drag-over-bottom td{border-bottom:2px solid var(--accent) !important}
  .owner-edit:hover{background:var(--blue-bg) !important;cursor:text}
  .owner-edit:focus{background:var(--blue-bg) !important;box-shadow:0 0 0 2px rgba(37,99,235,.25);border-radius:12px}
  /* 담당자 드롭다운 */
  .owner-wrap{position:relative;display:inline-block}
  .owner-btn{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--blue-bg);color:var(--blue);font-weight:500;white-space:nowrap;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s}
  .owner-btn:hover{opacity:.8}
  .owner-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:99999;padding:6px;min-width:150px}
  .owner-dd.open{display:block}
  .owner-opt{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;border:none;background:none;width:100%;font-family:'Noto Sans KR',sans-serif;text-align:left;color:var(--text1);transition:background .15s}
  .owner-opt:hover{background:var(--surface2)}
  .owner-opt.selected{color:var(--blue);font-weight:600}
  .owner-opt-text{flex:1}
  .owner-opt-actions{display:inline-flex;align-items:center;gap:2px}
  .owner-opt-edit{font-size:12px;opacity:0;transition:opacity .15s;cursor:pointer;padding:2px 4px;border:none;background:none;color:var(--text2)}
  .owner-opt-del{font-size:12px;opacity:0;transition:opacity .15s;cursor:pointer;padding:2px 4px;border:none;background:none;color:var(--red)}
  .owner-opt:hover .owner-opt-edit{opacity:1}
  .owner-opt:hover .owner-opt-del{opacity:1}
  .owner-add-row{display:flex;gap:4px;padding:6px 6px 2px;border-top:1px solid var(--border);margin-top:4px}
  .owner-add-input{flex:1;font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:4px 7px;border:1px solid var(--border2);border-radius:5px;outline:none;color:var(--text1)}
  .owner-add-input:focus{border-color:var(--accent)}
  .owner-add-btn{font-size:11px;font-family:'Noto Sans KR',sans-serif;font-weight:600;padding:4px 8px;border-radius:5px;border:none;cursor:pointer;background:var(--accent);color:#fff;white-space:nowrap}
  .dropdown-layer{position:fixed;inset:0;z-index:2147483647;pointer-events:none}
  @media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr)}.main{padding:16px}}
  @media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr)}.header{padding:0 16px}}
</style>
</head>
<body>
<header class="header">
  <div style="display:flex;align-items:center">
    <div class="logo">
      <div class="logo-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div>
      <div class="logo-text">과제관리 및 로드맵</div>
    </div>
    <div class="hdiv"></div>
    <span class="hmeta">네이버페이 주문형 외부가맹점 부스팅</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <button id="save-btn"
      onclick="exportData()"
      style="font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:600;
             padding:6px 16px;border-radius:8px;border:none;cursor:pointer;
             background:var(--accent);color:#fff;transition:all .2s">
      💾 저장
    </button>
  </div>
</header>

<main class="main">
  <div class="sg" id="sg"></div>
  <div class="tw">
    <div class="th">
      <button class="tb active" onclick="switchTab('list',this)">과제 목록</button>
      <button class="tb" onclick="switchTab('timeline',this)">월별 타임라인</button>
    </div>

    <!-- 목록 탭 -->
    <div id="tab-list">
      <div class="fb">
        <span class="fl">필터</span>
        <select id="f-owner" onchange="renderList()"><option value="">전체 담당자</option></select>
        <select id="f-status" onchange="renderList()">
          <option value="">전체 상태</option><option value="green">정상</option>
          <option value="yellow">주의</option><option value="red">지연</option><option value="gray">홀딩</option>
        </select>
        <select id="f-group" onchange="renderList()">
          <option value="">전체 그룹</option><option value="완료">완료</option>
          <option value="사업기획">사업 기획 과제</option><option value="서비스기획">서비스 기획 과제</option>
          <option value="하반기">26년 하반기</option>
        </select>
        <input type="text" id="f-search" placeholder="과제명 검색..." oninput="renderList()">
      </div>
      <div class="lb">
        <span class="lt">상태</span>
        <span class="li"><span class="dot" style="background:var(--green)"></span>정상</span>
        <span class="li"><span class="dot" style="background:var(--yellow)"></span>주의</span>
        <span class="li"><span class="dot" style="background:var(--red)"></span>지연</span>
        <span class="li"><span class="dot" style="background:var(--gray)"></span>홀딩</span>
      </div>
      <div id="list-content"></div>
    </div>

    <!-- 타임라인 탭 -->
    <div id="tab-timeline" style="display:none">
      <div class="fb">
        <span class="fl">필터</span>
        <select id="tl-owner" onchange="renderTimeline()"><option value="">전체 담당자</option></select>
        <select id="tl-group" onchange="renderTimeline()">
          <option value="">전체 그룹</option><option value="사업기획">사업 기획 과제</option>
          <option value="서비스기획">서비스 기획 과제</option><option value="하반기">26년 하반기</option>
        </select>
      </div>
      <div class="lb">
        <span class="lt">단계</span>
        <span class="li"><span class="pchip" style="background:var(--ph-plan-bg);color:var(--ph-plan)">기획</span></span>
        <span class="li"><span class="pchip" style="background:var(--ph-design-bg);color:var(--ph-design)">디자인</span></span>
        <span class="li"><span class="pchip" style="background:var(--ph-dev-bg);color:var(--ph-dev)">개발</span></span>
        <span class="li"><span class="pchip" style="background:var(--ph-open-bg);color:var(--ph-open)">배포</span></span>
        <span style="font-size:11px;color:var(--red);margin-left:6px" id="today-label">│ 오늘</span>
      </div>
      <div class="tlw" id="tl-content"></div>
    </div>
  </div>
</main>

<script>
const GROUPS=['완료','사업기획','서비스기획','하반기'];
const GL={'완료':'완료','사업기획':'사업 기획 과제','서비스기획':'서비스 기획 과제','하반기':'26년 하반기'};

// 2025.09 ~ 2026.12 (총 16개월)
const MONTHS=[];
for(let m=9;m<=12;m++) MONTHS.push({y:2025,m});
for(let m=1;m<=12;m++) MONTHS.push({y:2026,m});

// 오늘 날짜 (서버 기준으로 동적 계산)
function getTODAY(){
  const now = new Date();
  return {y: now.getFullYear(), m: now.getMonth() + 1, d: now.getDate()};
}

function moIdx(y,m){return MONTHS.findIndex(x=>x.y===y&&x.m===m);}

// 단계 설정: row0 = 윗줄, row1 = 아랫줄
// 위키 색상: 하늘=기획, 분홍=디자인, 노랑=개발, 빨강=배포
const PCFG=[
  {key:'plan',   bg:'var(--ph-plan-bg)',   color:'var(--ph-plan)',   label:'기획',  row:0},
  {key:'design', bg:'var(--ph-design-bg)', color:'var(--ph-design)', label:'디자인',row:0},
  {key:'dev',    bg:'var(--ph-dev-bg)',    color:'var(--ph-dev)',    label:'개발',  row:1},
  {key:'open',   bg:'var(--ph-open-bg)',   color:'var(--ph-open)',   label:'배포',  row:1},
];

// ── 과제 데이터 (위키 스크린샷 기반) ────────────────────────

  if(sy===ey&&sm===em) return `${sy}.${String(sm).padStart(2,'0')}`;

  return `<button class="phase-label ${cls}" onclick="openPhaseEdit(event,${tid},'${key}')">${display}</button>`;

function clearActiveDropdownRows(){

function setActiveDropdownRow(tid){

  if(row) row.classList.add('dropdown-active');
}

const dropdownOriginMap = new WeakMap();
let dropdownLayer = null;
let activeFloatingDropdown = null;

function getDropdownLayer(){
  if(dropdownLayer && dropdownLayer.isConnected) return dropdownLayer;
  dropdownLayer = document.createElement('div');
  dropdownLayer.className = 'dropdown-layer';
  document.body.appendChild(dropdownLayer);
  return dropdownLayer;
}

function mountDropdownPortal(dd){
  const layer = getDropdownLayer();
  if(!dd || dd.parentElement === layer) return;
  dropdownOriginMap.set(dd, { parent: dd.parentElement, next: dd.nextSibling });
  layer.appendChild(dd);
}

function restoreDropdownPortal(dd){
  const origin = dropdownOriginMap.get(dd);
  if(!origin) return;
  if(origin.parent && origin.parent.isConnected){
    if(origin.next && origin.next.parentNode === origin.parent){
      origin.parent.insertBefore(dd, origin.next);
    }else{
      origin.parent.appendChild(dd);
    }
  }else{
    dd.remove();
  }
  dropdownOriginMap.delete(dd);
}

function openDropdownFloating(dd, triggerEl){
  if(!dd || !triggerEl) return;
  mountDropdownPortal(dd);
  dd.classList.add('open');
  dd.style.position = 'fixed';
  dd.style.zIndex = '2147483647';
  dd.style.pointerEvents = 'auto';

  const rect = triggerEl.getBoundingClientRect();
  const margin = 8;
  let left = rect.left;
  let top = rect.bottom + 4;

  const dw = dd.offsetWidth;
  const dh = dd.offsetHeight;
  if(left + dw > window.innerWidth - margin){
    left = Math.max(margin, window.innerWidth - dw - margin);
  }
  if(top + dh > window.innerHeight - margin){
    top = Math.max(margin, rect.top - dh - 4);
  }

  dd.style.left = `${Math.round(left)}px`;
  dd.style.top = `${Math.round(top)}px`;
  dd.dataset.fixedLeft = dd.style.left;
  dd.dataset.fixedTop = dd.style.top;
  activeFloatingDropdown = dd;
}

window.addEventListener('scroll', ()=>{
  if(activeFloatingDropdown && activeFloatingDropdown.classList.contains('open')){
    if(activeFloatingDropdown.dataset.fixedLeft) activeFloatingDropdown.style.left = activeFloatingDropdown.dataset.fixedLeft;
    if(activeFloatingDropdown.dataset.fixedTop) activeFloatingDropdown.style.top = activeFloatingDropdown.dataset.fixedTop;
  }
}, true);

function closeAllDropdowns(){
  document.querySelectorAll('.phase-dropdown, .status-dd, .owner-dd').forEach(d=>{
    d.classList.remove('open');
    d.style.position = '';
    d.style.left = '';
    d.style.top = '';
    d.style.zIndex = '';
    d.style.pointerEvents = '';
    delete d.dataset.fixedLeft;
    delete d.dataset.fixedTop;
    restoreDropdownPortal(d);
  });
  activeFloatingDropdown = null;
  clearActiveDropdownRows();
}

  const ey=parseInt(document.getElementById(`dd-ey-${tid}-${key}`)?.value);
  const em=parseInt(document.getElementById(`dd-em-${tid}-${key}`)?.value);
  if(!sy||!sm||!ey||!em)return;

  renderList();

  if(document.getElementById('tab-timeline').style.display!=='none') renderTimeline();

  const t=tasks.find(x=>x.id===tid); if(!t)return;
  if(t.phases)t.phases[key]=null;
  closeAllDropdowns();
  renderList();
  if(document.getElementById('tab-timeline').style.display!=='none') renderTimeline();
}

  let body='';
  groups.forEach(g=>{

    if(!rows.length)return;
    body+=`<tr class="ts-row"><td class="sn" colspan="${2+MONTHS.length}">${GL[g]}</td></tr>`;

    rows.forEach(t=>{
      const ph=t.phases||{};

      // 각 월 인덱스별로 row0/row1에 어떤 단계가 들어오는지 매핑
      const map0=new Array(MONTHS.length).fill(null); // 윗줄: plan, design
      const map1=new Array(MONTHS.length).fill(null); // 아랫줄: dev, open

      PCFG.forEach(cfg=>{
        const p=ph[cfg.key];
        if(!p||!p[0]||!p[1])return;
        const si=moIdx(p[0][0],p[0][1]),ei=moIdx(p[1][0],p[1][1]);
        if(si<0||ei<0)return;
        for(let i=si;i<=Math.min(ei,MONTHS.length-1);i++){
          if(cfg.row===0) map0[i]=cfg;
          else map1[i]=cfg;
        }
      });

      // 각 월 셀 HTML 생성
      const cells=MONTHS.map((mo,i)=>{
        const c0=map0[i], c1=map1[i];
        const isToday=(i===todayIdx);

        // 바 세그먼트: 연속 여부에 따라 border-radius 결정
        function seg(cfg, map, i){
          if(!cfg) return `<div class="bar-seg" style="height:13px"></div>`;
          const prev=i>0?map[i-1]:null;
          const next=i<MONTHS.length-1?map[i+1]:null;
          const isStart=!prev||prev.key!==cfg.key;
          const isEnd=!next||next.key!==cfg.key;
          const bl=isStart?'4px':'0';
          const br=isEnd?'4px':'0';
          const displayLabel=(cfg.key==='open'&&t.openDate)?t.openDate:cfg.label;
          const label=isStart?`<span style="color:${cfg.color};font-size:9px;font-weight:600;white-space:nowrap">${displayLabel}</span>`:'';
          return `<div class="bar-seg" style="height:13px;background:${cfg.bg};border-radius:${bl} ${br} ${br} ${bl}">${label}</div>`;
        }

        const todayLineHtml=isToday
          ?`<div class="today-line" style="left:${Math.round(todayRatio*100)}%"></div>`
          :'';

        return `<td class="mo-cell${isToday?' today-cell':''}" style="position:relative">
          ${todayLineHtml}
          <div class="bar-row">
            ${seg(c0,map0,i)}
            ${seg(c1,map1,i)}
          </div>
        </td>`;
      }).join('');

      body+=`<tr>
        <td class="tdn">${t.name}</td>
        <td class="tdo">
          <span class="ot" style="min-width:40px;display:inline-block">${t.owner||'미정'}</span>
        </td>
        ${cells}
      </tr>`;
    });
  });

  document.getElementById('tl-content').innerHTML=
    `<table class="tlt"><thead>${yrH}${moH}</thead><tbody>${body}</tbody></table>`;
}

function setOwner(tid, owner){

  document.querySelectorAll('.owner-dd.open').forEach(d=>d.classList.remove('open'));

function addOwnerAndSet(tid){
  const inp = document.getElementById('owner-new-input-'+tid);
  if(!inp) return;
  const name = inp.value.trim();
  if(!name) return;
  if(!customOwners.includes(name) && !tasks.some(t=>t.owner===name)){
    customOwners.push(name);
  }
  setOwner(tid, name);
}

function editOwnerName(oldName){
  if(oldName === '미정') return;
  const newName = prompt(`담당자 이름 수정\n현재: ${oldName}`, oldName);
  if(!newName || newName.trim() === oldName) return;
  const trimmed = newName.trim();
  
  // 모든 과제의 담당자 업데이트
  tasks.forEach(t=>{
    if(t.owner === oldName) t.owner = trimmed;
  });
  
  // customOwners 업데이트
  const idx = customOwners.indexOf(oldName);
  if(idx !== -1) customOwners[idx] = trimmed;
  
  fillOwners();
  renderList();
  if(document.getElementById('tab-timeline').style.display!=='none') renderTimeline();
}

function deleteOwnerName(name){
  if(!name || name === '미정') return;
  tasks.forEach(t=>{
    if(t.owner === name) t.owner = '미정';
  });
  customOwners = customOwners.filter(o=>o !== name);
  fillOwners();
  renderList();
  if(document.getElementById('tab-timeline').style.display!=='none') renderTimeline();
}

// ── 드래그앤드롭 ─────────────────────────────────────────
let dragSrcId = null;

function onDragStart(e){
  dragSrcId = parseInt(e.currentTarget.dataset.id);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tr = e.currentTarget;
  // 마우스 위치에 따라 위/아래 표시
  const rect = tr.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  tr.classList.remove('drag-over-top','drag-over-bottom');
  if(e.clientY < mid) tr.classList.add('drag-over-top');
  else tr.classList.add('drag-over-bottom');
}

function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}

function onDrop(e){
  e.preventDefault();
  const tr = e.currentTarget;
  const targetId = parseInt(tr.dataset.id);
  tr.classList.remove('drag-over-top','drag-over-bottom');
  if(dragSrcId === null || dragSrcId === targetId) return;

  const srcIdx  = tasks.findIndex(t=>t.id===dragSrcId);
  const tgtIdx  = tasks.findIndex(t=>t.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;

  // 위/아래 판단
  const rect = tr.getBoundingClientRect();
  const insertAfter = e.clientY >= rect.top + rect.height / 2;

  // 다른 그룹으로 이동 시 group 변경
  const srcGroup = tasks[srcIdx].group;
  const tgtGroup = tasks[tgtIdx].group;
  if(srcGroup !== tgtGroup){
    tasks[srcIdx].group = tgtGroup;
  }

  // tasks 배열에서 srcIdx 항목 제거 후 tgtIdx 기준 재삽입
  const [moved] = tasks.splice(srcIdx, 1);
  const newTgtIdx = tasks.findIndex(t=>t.id===targetId);
  const insertAt = insertAfter ? newTgtIdx + 1 : newTgtIdx;
  tasks.splice(insertAt, 0, moved);

  renderSummary();
  renderList();
  // 타임라인 탭도 즉시 갱신
  if(document.getElementById('tab-timeline').style.display!=='none') renderTimeline();
}

function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('tr.drag-over-top, tr.drag-over-bottom').forEach(el=>{
    el.classList.remove('drag-over-top','drag-over-bottom');
  });
  dragSrcId = null;
}

// 그룹 헤더에 드롭 → 해당 그룹의 맨 위로 이동
function onDropGroup(e, targetGroup){
  e.preventDefault();
  if(dragSrcId===null) return;
  const srcIdx = tasks.findIndex(t=>t.id===dragSrcId);
  if(srcIdx<0) return;
  if(tasks[srcIdx].group === targetGroup) return;

  // group 변경
  tasks[srcIdx].group = targetGroup;

  // 해당 그룹의 첫 번째 항목 앞으로 이동
  const [moved] = tasks.splice(srcIdx, 1);
  const firstInGroup = tasks.findIndex(t=>t.group===targetGroup);
  if(firstInGroup>=0) tasks.splice(firstInGroup, 0, moved);
  else tasks.push(moved);

  renderSummary();
  renderList();
  if(document.getElementById('tab-timeline').style.display!=='none') renderTimeline();
}

// ── GitHub 자동 저장 ─────────────────────────────────────
const GH_USER = 'leo-pyo';
const GH_REPO = 'leo-order-plan';
const GH_FILE = 'data.json';
const GH_API  = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

// 토큰은 sessionStorage에만 보관 (파일에 저장 안 됨)
function getToken(){
  let token = sessionStorage.getItem('gh_token');
  if(!token){
    token = prompt('GitHub Personal Access Token을 입력해주세요:\n(이 창은 브라우저를 닫으면 사라지고 파일에 저장되지 않아요)');
    if(token) sessionStorage.setItem('gh_token', token.trim());
  }
  return token ? token.trim() : null;
}

function clearToken(){
  sessionStorage.removeItem('gh_token');
}

async function exportData(){
  const btn = document.getElementById('save-btn');
  const setBtn = (text, bg, color, disabled) => {
    if(!btn) return;
    btn.textContent = text;
    btn.style.background = bg || '';
    btn.style.color = color || '';
    btn.disabled = !!disabled;
  };

  const token = getToken();
  if(!token){ alert('토큰이 없어 저장을 취소했어요.'); return; }

  setBtn('저장 중...', '#e0f2fe', '#0ea5e9', true);

  const data = {tasks: tasks.map(t=>({
    id:t.id, group:t.group, name:t.name, owner:t.owner,
    status:t.status, target:t.target, memo:t.memo,
    openDate:t.openDate||'', phases:t.phases
  }))};
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

  try {
    const getRes = await fetch(GH_API, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const getJson = await getRes.json();
    if(!getJson.sha) throw new Error('파일 SHA를 가져오지 못했어요. 토큰을 확인해주세요.');
    const sha = getJson.sha;

    const putRes = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `data 업데이트 ${new Date().toLocaleString('ko-KR')}`,
        content: content,
        sha: sha
      })
    });

    if(putRes.ok){
      setBtn('✓ 저장완료', 'var(--green-bg)', 'var(--green)', false);
      setTimeout(()=>setBtn('💾 저장', '', '', false), 2000);
    } else {
      const err = await putRes.json();
      // 토큰 오류면 세션에서 제거 후 재시도 유도
      if(putRes.status===401||putRes.status===403){
        clearToken();
        throw new Error('토큰이 유효하지 않아요. 다시 시도하면 토큰을 다시 입력할 수 있어요.');
      }
      throw new Error(err.message || '업로드 실패');
    }
  } catch(e){
    console.error('GitHub 저장 실패:', e);
    setBtn('⚠️ 저장실패', 'var(--red-bg)', 'var(--red)', false);
    setTimeout(()=>setBtn('💾 저장', '', '', false), 2500);
    alert('저장 실패: ' + e.message);
  }
}

// ── 초기화 ────────────────────────────────────────────────
fetch('data.json')
  .then(r => { if(!r.ok) throw new Error('data.json 로드 실패'); return r.json(); })
  .then(data => {
    tasks = data.tasks;
    renderSummary(); fillOwners(); renderList();
  })
  .catch(err => {
    console.error(err);
    document.getElementById('list-content').innerHTML =
      '<div class="empty" style="color:var(--red)">⚠️ data.json을 불러올 수 없습니다.<br>VS Code에서 Live Server로 열어주세요.</div>';
  });
</script>
